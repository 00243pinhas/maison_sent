services:
  - type: web
    name: maison-sent-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run migration:run:prod && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: maison-sent-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: QUEUE_PREFIX
        value: maison-sent
      - key: APP_TIMEZONE
        value: Africa/Harare
      - key: JOB_LOW_STOCK_DIGEST_HOUR
        value: "8"
      - key: JOB_STALE_TRANSFER_HOURS
        value: "48"
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: maison-sent-db
    plan: free
    databaseName: maison_sent
    user: maison
